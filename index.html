<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAGER.GG — Skill-Based Wagering Platform</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A0F; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const GAMES = [
      { id: "warzone", name: "Warzone", icon: "🎯", color: "#4ADE80" },
      { id: "fortnite", name: "Fortnite", icon: "🏗️", color: "#A78BFA" },
      { id: "valorant", name: "Valorant", icon: "⚔️", color: "#F87171" },
    ];

    const WAGER_AMOUNTS = [5, 10, 25, 50];

    const OPPONENTS = [
      { name: "xNightfury", rank: "Diamond II", record: "142-89", rating: 1847 },
      { name: "Clutch_God99", rank: "Diamond III", record: "201-134", rating: 1823 },
      { name: "silentSn1per", rank: "Diamond I", record: "98-61", rating: 1862 },
    ];

    function WagerPlatform() {
      const [selectedGame, setSelectedGame] = useState("warzone");
      const [wager, setWager] = useState(10);
      const [view, setView] = useState("home");
      const [matchedOpponent, setMatchedOpponent] = useState(null);
      const [searching, setSearching] = useState(false);

      const startMatchmaking = () => {
        setView("matchmaking");
        setSearching(true);
        setTimeout(() => {
          setMatchedOpponent(OPPONENTS[Math.floor(Math.random() * OPPONENTS.length)]);
          setSearching(false);
        }, 2500);
      };

      const game = GAMES.find((g) => g.id === selectedGame);

      return (
        <div style={{
          minHeight: "100vh",
          background: "#0A0A0F",
          color: "#E4E4E7",
          fontFamily: "'Segoe UI', system-ui, sans-serif",
          position: "relative",
          overflow: "hidden",
        }}>
          <div style={{
            position: "absolute", top: "-200px", left: "50%", transform: "translateX(-50%)",
            width: "600px", height: "400px",
            background: `radial-gradient(ellipse, ${game.color}15, transparent 70%)`,
            pointerEvents: "none", transition: "background 0.6s ease",
          }} />

          <nav style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            padding: "16px 24px", borderBottom: "1px solid #1E1E2A",
            position: "relative", zIndex: 1,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <div style={{
                width: "32px", height: "32px", borderRadius: "8px",
                background: `linear-gradient(135deg, ${game.color}, ${game.color}88)`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: "14px", fontWeight: 800, color: "#0A0A0F",
                transition: "background 0.3s",
              }}>W</div>
              <span style={{ fontWeight: 700, fontSize: "18px", letterSpacing: "-0.5px" }}>WAGER.GG</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "20px", fontSize: "13px" }}>
              <div style={{
                background: "#1A1A24", borderRadius: "20px", padding: "6px 14px",
                display: "flex", alignItems: "center", gap: "6px",
                border: "1px solid #2A2A3A",
              }}>
                <span style={{ color: "#4ADE80", fontWeight: 700 }}>$247.50</span>
              </div>
              <div style={{
                width: "32px", height: "32px", borderRadius: "50%",
                background: "linear-gradient(135deg, #6366F1, #A78BFA)",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: "13px", fontWeight: 700,
              }}>G</div>
            </div>
          </nav>

          <div style={{ padding: "24px", maxWidth: "480px", margin: "0 auto", position: "relative", zIndex: 1 }}>
            {view === "home" && (
              <div>
                <p style={{ fontSize: "12px", textTransform: "uppercase", letterSpacing: "2px", color: "#71717A", marginBottom: "10px", fontWeight: 600 }}>Select Game</p>
                <div style={{ display: "flex", gap: "8px", marginBottom: "28px" }}>
                  {GAMES.map((g) => (
                    <button key={g.id} onClick={() => setSelectedGame(g.id)} style={{
                      flex: 1, padding: "14px 8px", borderRadius: "12px", border: "none", cursor: "pointer",
                      background: selectedGame === g.id ? `${g.color}18` : "#12121A",
                      outline: selectedGame === g.id ? `2px solid ${g.color}` : "2px solid #1E1E2A",
                      color: selectedGame === g.id ? g.color : "#71717A",
                      transition: "all 0.2s",
                      display: "flex", flexDirection: "column", alignItems: "center", gap: "6px",
                    }}>
                      <span style={{ fontSize: "22px" }}>{g.icon}</span>
                      <span style={{ fontSize: "12px", fontWeight: 600 }}>{g.name}</span>
                    </button>
                  ))}
                </div>

                <p style={{ fontSize: "12px", textTransform: "uppercase", letterSpacing: "2px", color: "#71717A", marginBottom: "10px", fontWeight: 600 }}>Wager Amount</p>
                <div style={{ display: "flex", gap: "8px", marginBottom: "28px" }}>
                  {WAGER_AMOUNTS.map((amt) => (
                    <button key={amt} onClick={() => setWager(amt)} style={{
                      flex: 1, padding: "12px", borderRadius: "10px", border: "none", cursor: "pointer",
                      background: wager === amt ? game.color : "#12121A",
                      color: wager === amt ? "#0A0A0F" : "#A1A1AA",
                      fontWeight: 700, fontSize: "15px",
                      outline: wager === amt ? "none" : "1px solid #1E1E2A",
                      transition: "all 0.15s",
                    }}>${amt}</button>
                  ))}
                </div>

                <div style={{
                  background: "#12121A", borderRadius: "14px", padding: "18px",
                  border: "1px solid #1E1E2A", marginBottom: "20px",
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: "13px", color: "#71717A", marginBottom: "12px" }}>
                    <span>Mode</span><span style={{ color: "#E4E4E7" }}>1v1 Ranked</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: "13px", color: "#71717A", marginBottom: "12px" }}>
                    <span>Your rank</span><span style={{ color: "#E4E4E7" }}>Diamond II — 1,847 SR</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: "13px", color: "#71717A", marginBottom: "12px" }}>
                    <span>Platform fee</span><span style={{ color: "#E4E4E7" }}>5%</span>
                  </div>
                  <div style={{ height: "1px", background: "#1E1E2A", margin: "12px 0" }} />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: "14px", fontWeight: 700 }}>
                    <span>Win payout</span><span style={{ color: "#4ADE80" }}>${(wager * 2 * 0.95).toFixed(2)}</span>
                  </div>
                </div>

                <button onClick={startMatchmaking} style={{
                  width: "100%", padding: "16px", borderRadius: "12px", border: "none",
                  background: `linear-gradient(135deg, ${game.color}, ${game.color}CC)`,
                  color: "#0A0A0F", fontWeight: 800, fontSize: "15px", cursor: "pointer",
                  letterSpacing: "0.5px",
                }}>
                  FIND OPPONENT — ${wager} WAGER
                </button>

                <div style={{
                  display: "flex", alignItems: "center", justifyContent: "center", gap: "6px",
                  marginTop: "16px", fontSize: "11px", color: "#52525B",
                }}>
                  <span>🛡️</span>
                  <span>Anti-cheat + replay verification active</span>
                </div>
              </div>
            )}

            {view === "matchmaking" && (
              <div style={{ textAlign: "center", paddingTop: "60px" }}>
                {searching ? (
                  <>
                    <div style={{
                      width: "80px", height: "80px", borderRadius: "50%", margin: "0 auto 24px",
                      border: `3px solid ${game.color}33`,
                      borderTopColor: game.color,
                      animation: "spin 1s linear infinite",
                    }} />
                    <p style={{ fontSize: "18px", fontWeight: 700, marginBottom: "8px" }}>Finding opponent...</p>
                    <p style={{ fontSize: "13px", color: "#71717A" }}>Matching within ±50 SR of your rank</p>
                  </>
                ) : matchedOpponent && (
                  <>
                    <p style={{ fontSize: "12px", color: game.color, fontWeight: 600, textTransform: "uppercase", letterSpacing: "2px", marginBottom: "20px" }}>Opponent Found</p>
                    <div style={{
                      display: "flex", justifyContent: "center", alignItems: "center", gap: "24px",
                      marginBottom: "32px",
                    }}>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ width: "56px", height: "56px", borderRadius: "50%", background: "linear-gradient(135deg, #6366F1, #A78BFA)", margin: "0 auto 8px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "20px", fontWeight: 800 }}>G</div>
                        <p style={{ fontWeight: 700, fontSize: "14px" }}>You</p>
                        <p style={{ fontSize: "11px", color: "#71717A" }}>1,847 SR</p>
                      </div>
                      <div style={{ fontSize: "22px", fontWeight: 800, color: game.color }}>VS</div>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ width: "56px", height: "56px", borderRadius: "50%", background: "linear-gradient(135deg, #EF4444, #F97316)", margin: "0 auto 8px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "20px", fontWeight: 800 }}>{matchedOpponent.name[0].toUpperCase()}</div>
                        <p style={{ fontWeight: 700, fontSize: "14px" }}>{matchedOpponent.name}</p>
                        <p style={{ fontSize: "11px", color: "#71717A" }}>{matchedOpponent.rating} SR</p>
                      </div>
                    </div>

                    <div style={{
                      background: "#12121A", borderRadius: "12px", padding: "14px",
                      border: "1px solid #1E1E2A", marginBottom: "24px", fontSize: "13px",
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "8px" }}>
                        <span style={{ color: "#71717A" }}>Game</span><span>{game.name}</span>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "8px" }}>
                        <span style={{ color: "#71717A" }}>Wager</span><span>${wager} each</span>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <span style={{ color: "#71717A" }}>Opponent record</span><span>{matchedOpponent.record}</span>
                      </div>
                    </div>

                    <div style={{ display: "flex", gap: "10px" }}>
                      <button onClick={() => { setView("home"); setMatchedOpponent(null); }} style={{
                        flex: 1, padding: "14px", borderRadius: "10px", border: "1px solid #2A2A3A",
                        background: "transparent", color: "#A1A1AA", fontWeight: 600, fontSize: "14px", cursor: "pointer",
                      }}>Decline</button>
                      <button onClick={() => setView("match")} style={{
                        flex: 2, padding: "14px", borderRadius: "10px", border: "none",
                        background: game.color, color: "#0A0A0F", fontWeight: 800, fontSize: "14px", cursor: "pointer",
                      }}>ACCEPT — LOCK IN ${wager}</button>
                    </div>
                  </>
                )}
              </div>
            )}

            {view === "match" && (
              <div style={{ textAlign: "center", paddingTop: "60px" }}>
                <div style={{
                  width: "64px", height: "64px", borderRadius: "50%", margin: "0 auto 20px",
                  background: `${game.color}22`, display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "28px",
                }}>✅</div>
                <p style={{ fontSize: "20px", fontWeight: 700, marginBottom: "8px" }}>Match Locked In</p>
                <p style={{ fontSize: "13px", color: "#71717A", marginBottom: "8px" }}>${wager} held in escrow · released to winner</p>
                <p style={{ fontSize: "13px", color: "#71717A", marginBottom: "32px" }}>Launch {game.name} and invite <span style={{ color: "#E4E4E7", fontWeight: 600 }}>{matchedOpponent?.name}</span></p>
                <button onClick={() => { setView("home"); setMatchedOpponent(null); }} style={{
                  padding: "12px 32px", borderRadius: "10px", border: "1px solid #2A2A3A",
                  background: "transparent", color: "#A1A1AA", fontWeight: 600, fontSize: "13px", cursor: "pointer",
                }}>Back to Home</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<WagerPlatform />);
  </script>
</body>
</html>
